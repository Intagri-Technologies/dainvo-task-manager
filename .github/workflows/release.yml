name: Release

on:
  push:
    tags:
      - '*'

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
        env:
          DAINVO_REQUIRE_CLOUD_CONFIG: "true"
          DAINVO_SUPABASE_URL: ${{ vars.DAINVO_SUPABASE_URL }}
          DAINVO_SUPABASE_PUBLISHABLE_KEY: ${{ vars.DAINVO_SUPABASE_PUBLISHABLE_KEY }}
          DAINVO_OBSIDIAN_OAUTH_CLIENT_ID: ${{ vars.DAINVO_OBSIDIAN_OAUTH_CLIENT_ID }}
          DAINVO_OBSIDIAN_OAUTH_REDIRECT_URI: https://users.dainvo.com/auth/obsidian-callback
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - uses: softprops/action-gh-release@v2
        with:
          name: Dainvo Task Manager ${{ github.ref_name }}
          body: |
            Dainvo Task Manager ${{ github.ref_name }}

            - Syncs task projections directly to Dainvo mobile from Obsidian desktop and mobile.
            - Keeps the local Dainvo desktop bridge independently available on desktop.
            - Supports stable IDs plus mobile complete/reopen/delete write-back without uploading Markdown bodies or vault files.
          files: |
            main.js
            manifest.json
            styles.css
