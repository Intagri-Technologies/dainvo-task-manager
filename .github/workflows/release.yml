name: Release

on:
  push:
    tags:
      - '*'

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
      - uses: softprops/action-gh-release@v2
        with:
          name: Dainvo Task Manager ${{ github.ref_name }}
          body: |
            Dainvo Task Manager ${{ github.ref_name }}

            - Syncs vault tasks with Dainvo through the local desktop bridge.
            - Includes pairing, vault task snapshots, Daily Notes settings export, and write-back for existing task lines.
          files: |
            main.js
            manifest.json
            styles.css
